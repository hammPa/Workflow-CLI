name: MLflow CI and Docker Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest
    
    # CI UTAMA: Memaksa GitHub Actions menggunakan login shell 
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # MENGINSTAL CONDA DI GITHUB ACTIONS (WAJIB)
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: '3.10'

    # INSTALL MLFLOW
    - name: Install MLflow
      run: |
        pip install mlflow pandas

    # JALANKAN MLFLOW (Memaksa pakai folder baru "mlruns_fresh")
    - name: Run MLflow Project (Training Model via Conda)
      run: |
        export MLFLOW_TRACKING_URI="file://$(pwd)/mlruns_fresh"
        mlflow run MLProject/ --experiment-name="Heart_Disease_Classification_Basic"

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get MLflow Run ID, Build, & Push
      run: |
        export MLFLOW_TRACKING_URI="file://$(pwd)/mlruns_fresh"
        RUN_ID=$(python -c "import mlflow; runs=mlflow.search_runs(experiment_names=['Heart_Disease_Classification_Basic']); print(runs.iloc[0].run_id)")
        echo "Ditemukan Run ID: $RUN_ID"
        
        # Build Docker Image
        mlflow models build-docker -m "runs:/$RUN_ID/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
        
        # Push ke Docker Hub
        docker push "${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-model:latest"
        
    - name: Save Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: mlruns_fresh/